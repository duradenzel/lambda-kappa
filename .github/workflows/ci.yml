name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install Docker Compose
        run: |
          docker compose version


      - name: Build Docker images
        run: docker compose build


      - name: Python syntax check
        run: |
          python -m py_compile shared/generator.py
          python -m py_compile lambda/speed/app.py
          python -m py_compile lambda/batch/app.py
          python -m py_compile lambda/storage/app.py


      - name: Validate docker compose file
        run: docker compose config


      - name: Start system (background)
        run: |
          docker compose up -d
          sleep 20

      - name: Test Lambda Speed endpoint
        run: curl -f http://localhost:5000/metrics || exit 1

      - name: Test Lambda Batch endpoint
        run: curl -f http://localhost:5002/metrics || exit 1

      - name: Shutdown system
        if: always()
        run: docker compose down