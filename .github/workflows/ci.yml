name: CI/CD - Lambda vs Kappa Monitoring System

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  # -------------------------
  # 1. BUILD
  # -------------------------
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build all Docker images
        run: docker compose build


  # -------------------------
  # 2. STATIC TESTS
  # -------------------------
  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Python syntax checks
        run: |
          python -m py_compile shared/generator.py
          python -m py_compile lambda/speed/app.py
          python -m py_compile lambda/batch/app.py
          python -m py_compile lambda/storage/app.py

      - name: Validate docker compose
        run: docker compose config


  # -------------------------
  # 3. SECURITY (DEVSECOPS - TRIVY)
  # -------------------------
  security:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      security-events: write   # FIX: required to upload SARIF to GitHub Security tab
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Images must be built in every job that uses them (runners are isolated)
      - name: Build Docker images for scanning
        run: docker compose build

      # Cache Trivy DB to avoid re-downloading ~97MB on every run
      - name: Cache Trivy DB
        uses: actions/cache@v4
        with:
          path: ~/.cache/trivy
          key: trivy-db-${{ runner.os }}-${{ github.run_id }}
          restore-keys: trivy-db-${{ runner.os }}-

      # FIX: exit-code removed from scan steps so both scans always run and
      # both SARIF files always exist before uploading. A separate step
      # checks for vulnerabilities and fails the job afterward.
      - name: Scan lambda-speed image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: lambda-speed
          format: sarif
          output: trivy-speed.sarif
          severity: HIGH,CRITICAL

      - name: Upload lambda-speed SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-speed.sarif
          category: lambda-speed

      - name: Scan lambda-batch image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: lambda-batch
          format: sarif
          output: trivy-batch.sarif
          severity: HIGH,CRITICAL

      - name: Upload lambda-batch SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-batch.sarif
          category: lambda-batch

      # FIX: Fail the job AFTER both scans and uploads are complete.
      # Re-runs Trivy in table format (no file output) purely to set exit code.
      - name: Fail job if HIGH/CRITICAL vulnerabilities found
        run: |
          trivy image --severity HIGH,CRITICAL --exit-code 1 --quiet lambda-speed
          trivy image --severity HIGH,CRITICAL --exit-code 1 --quiet lambda-batch


  # -------------------------
  # 4. INTEGRATION TESTS (SYSTEM RUN)
  # -------------------------
  integration:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Start full system
        run: docker compose up -d

      - name: Wait for services to initialize
        run: |
          echo "Waiting for services..."
          sleep 30

      # -------------------------
      # Health checks (better than blind sleep)
      # -------------------------
      - name: Check Lambda Speed endpoint
        run: curl -f http://localhost:5000/metrics > speed_metrics.txt

      - name: Check Lambda Batch endpoint
        run: curl -f http://localhost:5002/metrics > batch_metrics.txt

      # -------------------------
      # Collect logs (VERY important for debugging)
      # -------------------------
      - name: Export system logs
        if: always()
        run: docker compose logs > system_logs.txt

      # -------------------------
      # Upload artifacts (portfolio gold)
      # -------------------------
      - name: Upload metrics
        uses: actions/upload-artifact@v4
        with:
          name: metrics
          path: |
            speed_metrics.txt
            batch_metrics.txt

      - name: Upload system logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: system-logs
          path: system_logs.txt

      # -------------------------
      # Cleanup
      # -------------------------
      - name: Shutdown system
        if: always()
        run: docker compose down