name: CI/CD - Lambda vs Kappa Monitoring System

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  # -------------------------
  # 1. BUILD
  # -------------------------
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build all Docker images
        run: docker compose build


  # -------------------------
  # 2. STATIC TESTS
  # -------------------------
  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Python syntax checks
        run: |
          python -m py_compile shared/generator.py
          python -m py_compile lambda/speed/app.py
          python -m py_compile lambda/batch/app.py
          python -m py_compile lambda/storage/app.py

      - name: Validate docker compose
        run: docker compose config


  # -------------------------
  # 3. SECURITY (DEVSECOPS - TRIVY)
  # -------------------------
  security:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # IMPORTANT: images must exist in THIS job
      - name: Build Docker images for scanning
        run: docker compose build

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget curl
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin

      - name: Scan lambda-speed image
        run: trivy image --severity HIGH,CRITICAL -f json -o trivy-speed.json lambda-speed

      - name: Scan lambda-batch image
        run: trivy image --severity HIGH,CRITICAL -f json -o trivy-batch.json lambda-batch

      - name: Upload Trivy reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-reports
          path: |
            trivy-speed.json
            trivy-batch.json


  # -------------------------
  # 4. INTEGRATION TESTS (SYSTEM RUN)
  # -------------------------
  integration:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Start full system
        run: docker compose up -d

      - name: Wait for services to initialize
        run: |
          echo "Waiting for services..."
          sleep 30

      # -------------------------
      # Health checks (better than blind sleep)
      # -------------------------
      - name: Check Lambda Speed endpoint
        run: curl -f http://localhost:5000/metrics > speed_metrics.txt

      - name: Check Lambda Batch endpoint
        run: curl -f http://localhost:5002/metrics > batch_metrics.txt

      # -------------------------
      # Collect logs (VERY important for debugging)
      # -------------------------
      - name: Export system logs
        if: always()
        run: docker compose logs > system_logs.txt

      # -------------------------
      # Upload artifacts (portfolio gold)
      # -------------------------
      - name: Upload metrics
        uses: actions/upload-artifact@v4
        with:
          name: metrics
          path: |
            speed_metrics.txt
            batch_metrics.txt

      - name: Upload system logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: system-logs
          path: system_logs.txt

      # -------------------------
      # Cleanup
      # -------------------------
      - name: Shutdown system
        if: always()
        run: docker compose down