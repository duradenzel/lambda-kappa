name: CI Pipeline (Lambda/Kappa Monitoring System)

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  # -------------------------
  # 1. BUILD JOB
  # -------------------------
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build all Docker images
        run: docker compose build


  # -------------------------
  # 2. TEST JOB (static checks)
  # -------------------------
  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Python syntax validation
        run: |
          python -m py_compile shared/generator.py
          python -m py_compile lambda/speed/app.py
          python -m py_compile lambda/batch/app.py
          python -m py_compile lambda/storage/app.py

      - name: Validate docker compose
        run: docker compose config


  # -------------------------
  # 3. SECURITY SCAN (Trivy)
  # -------------------------
  security:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget curl

          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin

      # Scan all built images
      - name: Scan lambda-speed image
        run: trivy image lambda-speed || true

      - name: Scan lambda-batch image
        run: trivy image lambda-batch || true


  # -------------------------
  # 4. INTEGRATION TEST JOB
  # -------------------------
  integration:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start system
        run: docker compose up -d

      - name: Wait for services (health delay)
        run: sleep 25

      # -------------------------
      # Collect runtime metrics
      # -------------------------
      - name: Fetch Lambda Speed metrics
        run: curl -f http://localhost:5000/metrics > speed_metrics.txt

      - name: Fetch Lambda Batch metrics
        run: curl -f http://localhost:5002/metrics > batch_metrics.txt

      # -------------------------
      # Store logs for debugging
      # -------------------------
      - name: Export container logs
        if: always()
        run: docker compose logs > system_logs.txt

      # -------------------------
      # Upload artifacts
      # -------------------------
      - name: Upload metrics artifacts
        uses: actions/upload-artifact@v4
        with:
          name: metrics-data
          path: |
            speed_metrics.txt
            batch_metrics.txt

      - name: Upload system logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: system-logs
          path: system_logs.txt

      # -------------------------
      # Cleanup
      # -------------------------
      - name: Shutdown system
        if: always()
        run: docker compose down