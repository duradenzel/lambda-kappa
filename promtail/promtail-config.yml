server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Scrape all Docker container logs automatically
  # Labels container_name, image, and compose_service are extracted
  # so you can filter by service in Grafana
  - job_name: docker-containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: status
            values: ["running"]
    relabel_configs:
      # Use the container name as the job label
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: container
      # Expose the Docker image name
      - source_labels: ["__meta_docker_container_image"]
        target_label: image
      # Expose the compose service name for easy filtering
      - source_labels: ["__meta_docker_container_label_com_docker_compose_service"]
        target_label: compose_service
      # Only keep containers that have a compose service label
      # (i.e. your own services, not system containers)
      - source_labels: ["compose_service"]
        regex: ".+"
        action: keep