version: "3.9"
services:
  generator:
    build: ./shared
    container_name: generator
    volumes:
      - ./shared:/data
    command: ["python", "generator.py"]

  lambda-speed:
    build: ./lambda/speed
    image: lambda-speed
    container_name: lambda-speed
    ports:
      - "5000:5000"
    volumes:
      - ./shared:/data

  lambda-batch:
    build: ./lambda/batch
    image: lambda-batch
    container_name: lambda-batch
    ports:
      - "5002:5002"
    volumes:
      - ./shared:/data

  telegraf:
    image: telegraf:latest
    container_name: telegraf
    volumes:
      - ./kappa/telegraf/telegraf.conf:/etc/telegraf/telegraf.conf:ro
      - ./shared:/data
    ports:
      - "9273:9273"
    command: ["telegraf", "--config", "/etc/telegraf/telegraf.conf"]

  prometheus-lambda:
    image: prom/prometheus:latest
    container_name: prometheus-lambda
    ports:
      - "9091:9090"
    volumes:
      - ./lambda/prometheus-lambda.yml:/etc/prometheus/prometheus.yml

  prometheus-kappa:
    image: prom/prometheus:latest
    container_name: prometheus-kappa
    ports:
      - "9090:9090"
    volumes:
      - ./kappa/prometheus/prometheus-kappa.yml:/etc/prometheus/prometheus.yml

  # FIX: bumped to 3.4.2 — volume API (used by Grafana Drilldown) requires Loki 3.x
  loki:
    image: grafana/loki:3.4.2
    container_name: loki
    ports:
      - "3100:3100"
    volumes:
      - ./loki/loki-config.yml:/etc/loki/local-config.yaml
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml

  promtail:
    image: grafana/promtail:3.4.2
    container_name: promtail
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/config.yml
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus-lambda
      - prometheus-kappa
      - loki
    environment:
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
    volumes:
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/dashboards:/var/lib/grafana/dashboards
      - grafana-data:/var/lib/grafana

volumes:
  loki-data:
  grafana-data: